name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Correr tests
        run: npm test

      - name: Build imagen Docker
        run: docker build -t tasks-api:ci-test .

  deploy:
    needs: ci
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        run: echo "Deploy a producción - pendiente de configurar servidor"